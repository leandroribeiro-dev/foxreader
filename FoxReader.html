<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FoxReader - Caixa de Leitura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .box {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      min-height: 350px;
      font-size: 18px;
      outline: none;
      white-space: pre-wrap;
    }

    .info {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <h1>FoxReader</h1>

  <p class="info">
    Cole seu texto abaixo. Depois selecione o texto, clique com o botão direito
    e escolha <strong>Ler em voz alta</strong> ou use o recurso de leitura do Edge.
  </p>

  <div class="box" contenteditable="true">
Cole seu texto aqui...
  </div>
</body>
</html>
