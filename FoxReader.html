<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FoxReader V3.1</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px;
      line-height: 1.6;
    }

    header {
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 8px;
      z-index: 10;
    }

    h1 {
      text-align: center;
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .subtitulo {
      text-align: center;
      color: #555;
      margin: 4px 0 10px 0;
      font-size: 14px;
    }

    .linha-controles {
      display: grid;
      grid-template-columns: 1fr 150px 120px 210px;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
      color: #222;
    }

    select,
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 7px;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 5px;
      background: white;
    }

    .botoes {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #1f6feb;
      color: white;
    }

    button:hover {
      background: #1557b0;
    }

    button.stop {
      background: #b42318;
    }

    button.stop:hover {
      background: #8a1c13;
    }

    button.clear,
    button.adjust {
      background: #555;
    }

    button.clear:hover,
    button.adjust:hover {
      background: #333;
    }

    button.secondary {
      background: #4444cc;
    }

    button.secondary:hover {
      background: #3030a0;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 2px;
    }

    .lendo-agora {
      background: #fffbe6;
      border: 1px solid #e0c84f;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 14px;
      min-height: 40px;
    }

    .lendo-agora strong {
      color: #333;
    }

    main {
      display: flex;
      flex-direction: column;
    }

    .box {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      height: calc(100vh - 285px);
      min-height: 340px;
      font-size: 18px;
      outline: none;
      white-space: pre-wrap;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .box:empty::before {
      content: attr(data-placeholder);
      color: #888;
      pointer-events: none;
    }

    .frase-marcada {
      background: #fff176;
      border-radius: 4px;
      padding: 2px 3px;
    }

    footer {
      margin-top: 10px;
      padding: 8px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    footer img {
      max-height: 32px;
      vertical-align: middle;
      margin-right: 8px;
    }

    @media (max-width: 950px) {
      .linha-controles {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .box {
        height: calc(100vh - 430px);
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>FoxReader V3.1</h1>

    <p class="subtitulo">
      Cole, carregue ou normalize um texto para leitura em voz alta.
    </p>

    <div class="linha-controles">
      <label>
        Voz:
        <select id="seletorVoz">
          <option>Carregando vozes...</option>
        </select>
      </label>

      <button id="btnAlternarVozes" class="secondary" onclick="alternarListaVozes()">
        Mostrar todas
      </button>

      <label>
        Velocidade:
        <input id="velocidade" type="number" min="0.6" max="1.8" step="0.1" value="1.0">
      </label>

      <label>
        Arquivo TXT/MD:
        <input id="arquivoTexto" type="file" accept=".txt,.md,text/plain,text/markdown" onchange="carregarArquivoTexto(event)">
      </label>
    </div>

    <div class="botoes">
      <button onclick="testarVoz()">Testar voz</button>
      <button onclick="lerTexto()">Ler texto</button>
      <button onclick="pausarTexto()">Pausar</button>
      <button onclick="continuarTexto()">Continuar</button>
      <button class="stop" onclick="pararTexto()">Parar</button>
      <button class="clear" onclick="limparTexto()">Limpar texto</button>
      <button class="adjust" onclick="normalizarTexto()">Normalizar texto</button>
      <button onclick="carregarVozes()">Recarregar vozes</button>
    </div>

    <div id="status" class="status">
      Aguardando carregamento das vozes.
    </div>
  </header>

  <main>
    <div id="lendoAgora" class="lendo-agora">
      <strong>Lendo agora:</strong> —
    </div>

    <div
      id="caixaTexto"
      class="box"
      contenteditable="true"
      data-placeholder="Cole seu texto aqui..."
    ></div>
  </main>

  <footer>
    <!-- Se quiser usar imagem depois:
    <img src="img/raposinha.png" alt="FoxReader">
    -->
    FoxReader V3.1 — Leitor local em HTML, CSS e JavaScript
  </footer>

  <script>
    let vozesDisponiveis = [];
    let mostrarTodasAsVozes = false;

    let textoOriginalLeitura = "";
    let frasesLeitura = [];
    let leituraEmAndamento = null;

    const seletor = document.getElementById("seletorVoz");
    const statusBox = document.getElementById("status");
    const velocidade = document.getElementById("velocidade");
    const caixaTexto = document.getElementById("caixaTexto");
    const lendoAgora = document.getElementById("lendoAgora");
    const btnAlternarVozes = document.getElementById("btnAlternarVozes");

    function normalizarNome(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function ehVozPrincipal(voz) {
      const nome = normalizarNome(voz.name);

      return (
        nome.includes("antonio") ||
        nome.includes("francisca") ||
        nome.includes("daniel") ||
        nome.includes("maria")
      );
    }

    function ehVozAntonio(voz) {
      return normalizarNome(voz.name).includes("antonio");
    }

    function ehVozFrancisca(voz) {
      return normalizarNome(voz.name).includes("francisca");
    }

    function ehVozOnlineOuNatural(voz) {
      const nome = normalizarNome(voz.name);

      return (
        nome.includes("online") ||
        nome.includes("natural")
      );
    }

    function ordenarVozesPrincipais(vozes) {
      const ordem = ["antonio", "francisca", "daniel", "maria"];

      return vozes.sort((a, b) => {
        const nomeA = normalizarNome(a.name);
        const nomeB = normalizarNome(b.name);

        const posA = ordem.findIndex(item => nomeA.includes(item));
        const posB = ordem.findIndex(item => nomeB.includes(item));

        return posA - posB;
      });
    }

    function carregarVozes() {
      vozesDisponiveis = speechSynthesis.getVoices();

      seletor.innerHTML = "";

      let vozesPortugues = vozesDisponiveis.filter(voz =>
        voz.lang.toLowerCase().startsWith("pt")
      );

      let listaFinal = [];

      if (mostrarTodasAsVozes) {
        listaFinal = vozesPortugues.length > 0 ? vozesPortugues : vozesDisponiveis;
        btnAlternarVozes.textContent = "Mostrar principais";
      } else {
        listaFinal = vozesPortugues.filter(ehVozPrincipal);
        listaFinal = ordenarVozesPrincipais(listaFinal);
        btnAlternarVozes.textContent = "Mostrar todas";
      }

      if (listaFinal.length === 0) {
        listaFinal = vozesPortugues.length > 0 ? vozesPortugues : vozesDisponiveis;
      }

      if (listaFinal.length === 0) {
        const option = document.createElement("option");
        option.textContent = "Nenhuma voz encontrada";
        option.value = "";
        seletor.appendChild(option);
        statusBox.textContent = "Nenhuma voz foi carregada pelo navegador.";
        return;
      }

      listaFinal.forEach((voz) => {
        const option = document.createElement("option");
        option.value = voz.voiceURI;

        const marcador = ehVozOnlineOuNatural(voz)
          ? "[Online/Natural]"
          : "[Local]";

        option.textContent = `${voz.name} (${voz.lang}) ${marcador}`;
        seletor.appendChild(option);
      });

      definirVozPadrao(listaFinal);

      if (mostrarTodasAsVozes) {
        statusBox.textContent = `Foram encontradas ${listaFinal.length} voz(es). Modo: todas as vozes.`;
      } else {
        statusBox.textContent = "Modo principal: Antônio, Francisca, Daniel e Maria.";
      }
    }

    function definirVozPadrao(listaFinal) {
      const vozAntonio = listaFinal.find(ehVozAntonio);
      const vozFrancisca = listaFinal.find(ehVozFrancisca);

      if (vozAntonio) {
        seletor.value = vozAntonio.voiceURI;
        return;
      }

      if (vozFrancisca) {
        seletor.value = vozFrancisca.voiceURI;
        return;
      }

      if (listaFinal.length > 0) {
        seletor.value = listaFinal[0].voiceURI;
      }
    }

    function alternarListaVozes() {
      mostrarTodasAsVozes = !mostrarTodasAsVozes;
      carregarVozes();
    }

    function obterVozSelecionada() {
      const voiceURI = seletor.value;

      return vozesDisponiveis.find(voz => voz.voiceURI === voiceURI) || null;
    }

    function obterVelocidade() {
      let valor = parseFloat(String(velocidade.value).replace(",", "."));

      if (isNaN(valor)) {
        valor = 1.0;
      }

      if (valor < 0.6) {
        valor = 0.6;
      }

      if (valor > 1.8) {
        valor = 1.8;
      }

      velocidade.value = valor.toFixed(1);

      return valor;
    }

    function dividirEmFrases(texto) {
      const regex = /[^.!?;:]+[.!?;:]?|[^.!?;:]+$/g;
      const resultado = texto.match(regex);

      if (!resultado) {
        return [texto];
      }

      return resultado
        .map(frase => frase.trim())
        .filter(frase => frase.length > 0);
    }

    function escaparHTML(texto) {
      return texto
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderizarTextoComMarcacao(indiceFrase) {
      if (!frasesLeitura || frasesLeitura.length === 0) {
        return;
      }

      let html = "";

      frasesLeitura.forEach((frase, index) => {
        const fraseSegura = escaparHTML(frase);

        if (index === indiceFrase) {
          html += `<span class="frase-marcada">${fraseSegura}</span> `;
        } else {
          html += `${fraseSegura} `;
        }
      });

      caixaTexto.innerHTML = html.trim();

      const marcada = caixaTexto.querySelector(".frase-marcada");

      if (marcada) {
        rolarDentroDaCaixa(marcada);
      }
    }

    function rolarDentroDaCaixa(elemento) {
      const caixaAltura = caixaTexto.clientHeight;
      const alvoTopo = elemento.offsetTop;
      const alvoAltura = elemento.offsetHeight;

      caixaTexto.scrollTop = alvoTopo - (caixaAltura / 2) + (alvoAltura / 2);
    }

    function localizarFrasePorCaracter(charIndex) {
      let acumulado = 0;

      for (let i = 0; i < frasesLeitura.length; i++) {
        const tamanho = frasesLeitura[i].length + 1;

        if (charIndex >= acumulado && charIndex < acumulado + tamanho) {
          return i;
        }

        acumulado += tamanho;
      }

      return -1;
    }

    function atualizarLendoAgora(indiceFrase) {
      if (indiceFrase < 0 || indiceFrase >= frasesLeitura.length) {
        lendoAgora.innerHTML = "<strong>Lendo agora:</strong> —";
        return;
      }

      lendoAgora.innerHTML = `<strong>Lendo agora:</strong> ${escaparHTML(frasesLeitura[indiceFrase])}`;
    }

    function falar(texto) {
      if (!texto.trim()) {
        alert("Não há texto para leitura.");
        return;
      }

      pararTexto(false);

      textoOriginalLeitura = texto.trim();
      frasesLeitura = dividirEmFrases(textoOriginalLeitura);

      const fala = new SpeechSynthesisUtterance(textoOriginalLeitura);
      const vozSelecionada = obterVozSelecionada();

      fala.rate = obterVelocidade();
      fala.pitch = 1;
      fala.volume = 1;
      fala.lang = "pt-BR";

      if (vozSelecionada) {
        fala.voice = vozSelecionada;
        fala.lang = vozSelecionada.lang;
        statusBox.textContent = `Preparando leitura com: ${vozSelecionada.name}`;
      } else {
        statusBox.textContent = "Preparando leitura com a voz padrão do navegador.";
      }

      fala.onstart = function () {
        if (vozSelecionada) {
          statusBox.textContent = `Lendo com: ${vozSelecionada.name} (${vozSelecionada.lang})`;
        } else {
          statusBox.textContent = "Lendo com a voz padrão do navegador.";
        }

        renderizarTextoComMarcacao(0);
        atualizarLendoAgora(0);
      };

      fala.onboundary = function (event) {
        if (typeof event.charIndex !== "number") {
          return;
        }

        const indiceFrase = localizarFrasePorCaracter(event.charIndex);

        if (indiceFrase >= 0) {
          renderizarTextoComMarcacao(indiceFrase);
          atualizarLendoAgora(indiceFrase);
        }
      };

      fala.onerror = function (event) {
        statusBox.textContent = "Erro na leitura. Tente outra voz, preferencialmente local.";
        console.error("Erro SpeechSynthesis:", event);
      };

      fala.onend = function () {
        statusBox.textContent = "Leitura concluída.";
        lendoAgora.innerHTML = "<strong>Lendo agora:</strong> —";
        caixaTexto.innerText = textoOriginalLeitura;
      };

      leituraEmAndamento = fala;
      speechSynthesis.speak(fala);
    }

    function testarVoz() {
      falar("Teste de leitura do FoxReader. Esta é uma voz em português.");
    }

    function lerTexto() {
      const texto = caixaTexto.innerText.trim();
      falar(texto);
    }

    function pausarTexto() {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        statusBox.textContent = "Leitura pausada.";
      }
    }

    function continuarTexto() {
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        statusBox.textContent = "Leitura retomada.";
      } else {
        statusBox.textContent = "Não há leitura pausada para continuar.";
      }
    }

    function pararTexto(restaurarTexto = true) {
      speechSynthesis.cancel();

      if (restaurarTexto && textoOriginalLeitura) {
        caixaTexto.innerText = textoOriginalLeitura;
      }

      lendoAgora.innerHTML = "<strong>Lendo agora:</strong> —";
      statusBox.textContent = "Leitura parada.";
    }

    function limparTexto() {
      pararTexto(false);
      textoOriginalLeitura = "";
      frasesLeitura = [];
      caixaTexto.innerText = "";
      caixaTexto.focus();
      statusBox.textContent = "Texto limpo.";
    }

    function normalizarTexto() {
      pararTexto(false);

      let texto = caixaTexto.innerText;

      if (!texto.trim()) {
        alert("Não há texto para normalizar.");
        return;
      }

      texto = texto
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\n{2,}/g, "###PARAGRAFO###")
        .replace(/\n/g, " ")
        .replace(/###PARAGRAFO###/g, "\n\n")
        .replace(/[ \t]{2,}/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .replace(/([,.!?;:])([^\s\n])/g, "$1 $2")
        .trim();

      caixaTexto.innerText = texto;
      statusBox.textContent = "Texto normalizado.";
    }

    function carregarArquivoTexto(event) {
      const arquivo = event.target.files[0];

      if (!arquivo) {
        return;
      }

      const nome = arquivo.name.toLowerCase();

      if (!nome.endsWith(".txt") && !nome.endsWith(".md")) {
        alert("Formato não recomendado. Use arquivos .txt ou .md nesta versão.");
        event.target.value = "";
        return;
      }

      const leitor = new FileReader();

      leitor.onload = function(e) {
        pararTexto(false);

        caixaTexto.innerText = e.target.result;
        textoOriginalLeitura = "";
        frasesLeitura = [];

        statusBox.textContent = `Arquivo carregado: ${arquivo.name}`;
      };

      leitor.onerror = function() {
        statusBox.textContent = "Erro ao carregar o arquivo.";
      };

      leitor.readAsText(arquivo, "UTF-8");
    }

    speechSynthesis.onvoiceschanged = carregarVozes;

    carregarVozes();

    setTimeout(carregarVozes, 1000);
  </script>

</body>
</html>
