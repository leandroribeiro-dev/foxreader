<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FoxReader V3.3</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
    }

    .app {
      height: 100vh;
      max-width: 1320px;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    header {
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    h1 {
      text-align: center;
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .subtitulo {
      text-align: center;
      color: #555;
      margin: 3px 0 8px 0;
      font-size: 13px;
    }

    .linha-controles {
      display: grid;
      grid-template-columns: 1fr 145px 115px 210px;
      gap: 8px;
      align-items: end;
      margin-bottom: 8px;
    }

    label {
      font-size: 13px;
      color: #222;
    }

    select,
    input[type="number"],
    input[type="file"] {
      width: 100%;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 5px;
      background: white;
    }

    .botoes {
      display: flex;
      gap: 7px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    button {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #1f6feb;
      color: white;
    }

    button:hover {
      background: #1557b0;
    }

    button.stop {
      background: #b42318;
    }

    button.stop:hover {
      background: #8a1c13;
    }

    button.clear,
    button.adjust,
    button.log {
      background: #555;
    }

    button.clear:hover,
    button.adjust:hover,
    button.log:hover {
      background: #333;
    }

    button.secondary {
      background: #4444cc;
    }

    button.secondary:hover {
      background: #3030a0;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #555;
      min-height: 18px;
    }

    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .box {
      flex: 1;
      min-height: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      font-size: 20px;
      outline: none;
      white-space: pre-wrap;
      overflow-y: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .box:empty::before {
      content: attr(data-placeholder);
      color: #888;
      pointer-events: none;
    }

    .frase-marcada {
      background: #fff176;
      border-radius: 4px;
      padding: 2px 3px;
    }

    .painel-log {
      display: none;
      height: 150px;
      flex-shrink: 0;
      background: #111;
      color: #ddd;
      border-radius: 8px;
      border: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    footer {
      flex-shrink: 0;
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 4px;
    }

    footer img {
      max-height: 28px;
      vertical-align: middle;
      margin-right: 8px;
    }

    @media (max-width: 950px) {
      html,
      body {
        overflow: auto;
      }

      body {
        height: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .linha-controles {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .box {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <header>
      <h1>FoxReader V3.3</h1>

      <p class="subtitulo">
        Cole, carregue ou normalize um texto para leitura em voz alta.
      </p>

      <div class="linha-controles">
        <label>
          Voz:
          <select id="seletorVoz">
            <option>Carregando vozes...</option>
          </select>
        </label>

        <button id="btnAlternarVozes" class="secondary" onclick="alternarListaVozes()">
          Mostrar todas
        </button>

        <label>
          Velocidade:
          <input id="velocidade" type="number" min="0.6" max="1.8" step="0.1" value="1.0">
        </label>

        <label>
          Arquivo TXT/MD:
          <input id="arquivoTexto" type="file" accept=".txt,.md,text/plain,text/markdown" onchange="carregarArquivoTexto(event)">
        </label>
      </div>

      <div class="botoes">
        <button onclick="testarVoz()">Testar voz</button>
        <button onclick="lerTexto()">Ler texto</button>
        <button onclick="pausarTexto()">Pausar</button>
        <button onclick="continuarTexto()">Continuar</button>
        <button class="stop" onclick="pararTexto()">Parar</button>
        <button class="clear" onclick="limparTexto()">Limpar texto</button>
        <button class="adjust" onclick="normalizarTexto()">Normalizar texto</button>
        <button onclick="carregarVozes()">Recarregar vozes</button>
        <button class="log" onclick="alternarLog()">Mostrar log</button>
        <button class="log" onclick="baixarLog()">Baixar log</button>
      </div>

      <div id="status" class="status">
        Aguardando carregamento das vozes.
      </div>
    </header>

    <main>
      <div
        id="caixaTexto"
        class="box"
        contenteditable="true"
        data-placeholder="Cole seu texto aqui..."
      ></div>

      <div id="painelLog" class="painel-log"></div>
    </main>

    <footer>
      <!-- Para usar imagem depois:
      <img src="img/raposinha.png" alt="FoxReader">
      -->
      FoxReader V3.3 — HTML, CSS e JavaScript
    </footer>

  </div>

  <script>
    let vozesDisponiveis = [];
    let mostrarTodasAsVozes = false;

    let textoOriginalLeitura = "";
    let frasesLeitura = [];
    let leituraEmAndamento = null;
    let indiceFraseAtual = -1;

    let registrosLog = [];

    const seletor = document.getElementById("seletorVoz");
    const statusBox = document.getElementById("status");
    const velocidade = document.getElementById("velocidade");
    const caixaTexto = document.getElementById("caixaTexto");
    const btnAlternarVozes = document.getElementById("btnAlternarVozes");
    const painelLog = document.getElementById("painelLog");

    function registrarLog(mensagem) {
      const agora = new Date();
      const hora = agora.toLocaleTimeString("pt-BR");
      const linha = `[${hora}] ${mensagem}`;

      registrosLog.push(linha);

      painelLog.textContent = registrosLog.join("\n");
      painelLog.scrollTop = painelLog.scrollHeight;

      console.log(linha);
    }

    function alternarLog() {
      if (painelLog.style.display === "block") {
        painelLog.style.display = "none";
        registrarLog("Painel de log ocultado.");
      } else {
        painelLog.style.display = "block";
        registrarLog("Painel de log exibido.");
      }
    }

    function baixarLog() {
      const conteudo = registrosLog.join("\n");

      if (!conteudo.trim()) {
        alert("Não há registros de log para baixar.");
        return;
      }

      const blob = new Blob([conteudo], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "FoxReader_Log.txt";
      link.click();

      URL.revokeObjectURL(url);

      registrarLog("Log baixado em arquivo TXT.");
    }

    function atualizarStatus(mensagem) {
      statusBox.textContent = mensagem;
      registrarLog(mensagem);
    }

    function normalizarNome(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function ehVozPrincipal(voz) {
      const nome = normalizarNome(voz.name);

      return (
        nome.includes("antonio") ||
        nome.includes("francisca") ||
        nome.includes("daniel") ||
        nome.includes("maria")
      );
    }

    function ehVozAntonio(voz) {
      return normalizarNome(voz.name).includes("antonio");
    }

    function ehVozFrancisca(voz) {
      return normalizarNome(voz.name).includes("francisca");
    }

    function ehVozOnlineOuNatural(voz) {
      const nome = normalizarNome(voz.name);

      return (
        nome.includes("online") ||
        nome.includes("natural")
      );
    }

    function ordenarVozesPrincipais(vozes) {
      const ordem = ["antonio", "francisca", "daniel", "maria"];

      return vozes.sort((a, b) => {
        const nomeA = normalizarNome(a.name);
        const nomeB = normalizarNome(b.name);

        const posA = ordem.findIndex(item => nomeA.includes(item));
        const posB = ordem.findIndex(item => nomeB.includes(item));

        return posA - posB;
      });
    }

    function carregarVozes() {
      vozesDisponiveis = speechSynthesis.getVoices();

      seletor.innerHTML = "";

      let vozesPortugues = vozesDisponiveis.filter(voz =>
        voz.lang.toLowerCase().startsWith("pt")
      );

      let listaFinal = [];

      if (mostrarTodasAsVozes) {
        listaFinal = vozesPortugues.length > 0 ? vozesPortugues : vozesDisponiveis;
        btnAlternarVozes.textContent = "Mostrar principais";
      } else {
        listaFinal = vozesPortugues.filter(ehVozPrincipal);
        listaFinal = ordenarVozesPrincipais(listaFinal);
        btnAlternarVozes.textContent = "Mostrar todas";
      }

      if (listaFinal.length === 0) {
        listaFinal = vozesPortugues.length > 0 ? vozesPortugues : vozesDisponiveis;
      }

      if (listaFinal.length === 0) {
        const option = document.createElement("option");
        option.textContent = "Nenhuma voz encontrada";
        option.value = "";
        seletor.appendChild(option);
        atualizarStatus("Nenhuma voz foi carregada pelo navegador.");
        return;
      }

      listaFinal.forEach((voz) => {
        const option = document.createElement("option");
        option.value = voz.voiceURI;

        const marcador = ehVozOnlineOuNatural(voz)
          ? "[Online/Natural]"
          : "[Local]";

        option.textContent = `${voz.name} (${voz.lang}) ${marcador}`;
        seletor.appendChild(option);
      });

      definirVozPadrao(listaFinal);

      if (mostrarTodasAsVozes) {
        atualizarStatus(`Foram encontradas ${listaFinal.length} voz(es). Modo: todas as vozes.`);
      } else {
        atualizarStatus("Modo principal: Antônio, Francisca, Daniel e Maria.");
      }
    }

    function definirVozPadrao(listaFinal) {
      const vozAntonio = listaFinal.find(ehVozAntonio);
      const vozFrancisca = listaFinal.find(ehVozFrancisca);

      if (vozAntonio) {
        seletor.value = vozAntonio.voiceURI;
        registrarLog(`Voz padrão selecionada: ${vozAntonio.name}`);
        return;
      }

      if (vozFrancisca) {
        seletor.value = vozFrancisca.voiceURI;
        registrarLog(`Voz padrão selecionada: ${vozFrancisca.name}`);
        return;
      }

      if (listaFinal.length > 0) {
        seletor.value = listaFinal[0].voiceURI;
        registrarLog(`Voz padrão selecionada: ${listaFinal[0].name}`);
      }
    }

    function alternarListaVozes() {
      mostrarTodasAsVozes = !mostrarTodasAsVozes;
      carregarVozes();
    }

    function obterVozSelecionada() {
      const voiceURI = seletor.value;

      return vozesDisponiveis.find(voz => voz.voiceURI === voiceURI) || null;
    }

    function obterVelocidade() {
      let valor = parseFloat(String(velocidade.value).replace(",", "."));

      if (isNaN(valor)) {
        valor = 1.0;
      }

      if (valor < 0.6) {
        valor = 0.6;
      }

      if (valor > 1.8) {
        valor = 1.8;
      }

      velocidade.value = valor.toFixed(1);

      return valor;
    }

    function dividirEmFrases(texto) {
      const regex = /[^.!?;:]+[.!?;:]?|[^.!?;:]+$/g;
      const resultado = texto.match(regex);

      if (!resultado) {
        return [texto];
      }

      return resultado
        .map(frase => frase.trim())
        .filter(frase => frase.length > 0);
    }

    function escaparHTML(texto) {
      return texto
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderizarTextoComMarcacao(indiceFrase) {
      if (!frasesLeitura || frasesLeitura.length === 0) {
        return;
      }

      if (indiceFrase === indiceFraseAtual) {
        return;
      }

      indiceFraseAtual = indiceFrase;

      let html = "";

      frasesLeitura.forEach((frase, index) => {
        const fraseSegura = escaparHTML(frase);

        if (index === indiceFrase) {
          html += `<span class="frase-marcada">${fraseSegura}</span> `;
        } else {
          html += `${fraseSegura} `;
        }
      });

      caixaTexto.innerHTML = html.trim();

      const marcada = caixaTexto.querySelector(".frase-marcada");

      if (marcada) {
        rolarDentroDaCaixa(marcada);
      }
    }

    function rolarDentroDaCaixa(elemento) {
      const margem = 90;

      const caixaTopoVisivel = caixaTexto.scrollTop;
      const caixaBaseVisivel = caixaTexto.scrollTop + caixaTexto.clientHeight;

      const elementoTopo = elemento.offsetTop;
      const elementoBase = elemento.offsetTop + elemento.offsetHeight;

      // Se a frase já está visível com folga, não mexe no scroll.
      if (
        elementoTopo >= caixaTopoVisivel + margem &&
        elementoBase <= caixaBaseVisivel - margem
      ) {
        return;
      }

      // Se a frase está acima da área confortável, rola suavemente para cima.
      if (elementoTopo < caixaTopoVisivel + margem) {
        caixaTexto.scrollTo({
          top: Math.max(elementoTopo - margem, 0),
          behavior: "smooth"
        });

        return;
      }

      // Se a frase está abaixo da área confortável, rola suavemente para baixo.
      if (elementoBase > caixaBaseVisivel - margem) {
        caixaTexto.scrollTo({
          top: elementoBase - caixaTexto.clientHeight + margem,
          behavior: "smooth"
        });

        return;
      }
    }

    function localizarFrasePorCaracter(charIndex) {
      let acumulado = 0;

      for (let i = 0; i < frasesLeitura.length; i++) {
        const tamanho = frasesLeitura[i].length + 1;

        if (charIndex >= acumulado && charIndex < acumulado + tamanho) {
          return i;
        }

        acumulado += tamanho;
      }

      return -1;
    }

    function falar(texto) {
      if (!texto.trim()) {
        alert("Não há texto para leitura.");
        return;
      }

      pararTexto(false);

      textoOriginalLeitura = texto.trim();
      frasesLeitura = dividirEmFrases(textoOriginalLeitura);
      indiceFraseAtual = -1;

      registrarLog(`Texto preparado. Total de frases detectadas: ${frasesLeitura.length}`);

      const fala = new SpeechSynthesisUtterance(textoOriginalLeitura);
      const vozSelecionada = obterVozSelecionada();

      fala.rate = obterVelocidade();
      fala.pitch = 1;
      fala.volume = 1;
      fala.lang = "pt-BR";

      if (vozSelecionada) {
        fala.voice = vozSelecionada;
        fala.lang = vozSelecionada.lang;
        atualizarStatus(`Preparando leitura com: ${vozSelecionada.name}`);
      } else {
        atualizarStatus("Preparando leitura com a voz padrão do navegador.");
      }

      fala.onstart = function () {
        if (vozSelecionada) {
          atualizarStatus(`Lendo com: ${vozSelecionada.name} (${vozSelecionada.lang})`);
        } else {
          atualizarStatus("Lendo com a voz padrão do navegador.");
        }

        renderizarTextoComMarcacao(0);
      };

      fala.onboundary = function (event) {
        if (typeof event.charIndex !== "number") {
          return;
        }

        const indiceFrase = localizarFrasePorCaracter(event.charIndex);

        // Só atualiza quando realmente mudar de frase.
        if (indiceFrase >= 0 && indiceFrase !== indiceFraseAtual) {
          registrarLog(`Frase atual: ${indiceFrase + 1}/${frasesLeitura.length}`);
          renderizarTextoComMarcacao(indiceFrase);
        }
      };

      fala.onerror = function (event) {
        const erro = event.error || "erro não especificado";
        const vozSelecionada = obterVozSelecionada();

        if (erro === "synthesis-failed") {
          atualizarStatus("A voz selecionada falhou durante a leitura. Tente Maria, Daniel ou reduza a velocidade.");
        } else if (erro === "interrupted") {
          atualizarStatus("Leitura interrompida.");
        } else if (erro === "canceled") {
          atualizarStatus("Leitura cancelada.");
        } else {
          atualizarStatus(`Erro na leitura: ${erro}.`);
        }

        if (vozSelecionada) {
          registrarLog(`ERRO SpeechSynthesis: ${erro} | Voz: ${vozSelecionada.name} (${vozSelecionada.lang})`);
        } else {
          registrarLog(`ERRO SpeechSynthesis: ${erro} | Voz padrão do navegador`);
        }
      };

      fala.onend = function () {
        atualizarStatus("Leitura concluída.");
        caixaTexto.innerText = textoOriginalLeitura;
        indiceFraseAtual = -1;
      };

      leituraEmAndamento = fala;
      speechSynthesis.speak(fala);
    }

    function testarVoz() {
      falar("Teste de leitura do FoxReader. Esta é uma voz em português.");
    }

    function lerTexto() {
      const texto = caixaTexto.innerText.trim();
      falar(texto);
    }

    function pausarTexto() {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        atualizarStatus("Leitura pausada.");
      } else {
        atualizarStatus("Não há leitura ativa para pausar.");
      }
    }

    function continuarTexto() {
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        atualizarStatus("Leitura retomada.");
      } else {
        atualizarStatus("Não há leitura pausada para continuar.");
      }
    }

    function pararTexto(restaurarTexto = true) {
      speechSynthesis.cancel();

      if (restaurarTexto && textoOriginalLeitura) {
        caixaTexto.innerText = textoOriginalLeitura;
      }

      indiceFraseAtual = -1;
      registrarLog("Leitura parada/cancelada.");
      statusBox.textContent = "Leitura parada.";
    }

    function limparTexto() {
      pararTexto(false);
      textoOriginalLeitura = "";
      frasesLeitura = [];
      indiceFraseAtual = -1;
      caixaTexto.innerText = "";
      caixaTexto.focus();
      atualizarStatus("Texto limpo.");
    }

    function normalizarTexto() {
      pararTexto(false);

      let texto = caixaTexto.innerText;

      if (!texto.trim()) {
        alert("Não há texto para normalizar.");
        return;
      }

      texto = texto
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\n{2,}/g, "###PARAGRAFO###")
        .replace(/\n/g, " ")
        .replace(/###PARAGRAFO###/g, "\n\n")
        .replace(/[ \t]{2,}/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .replace(/([,.!?;:])([^\s\n])/g, "$1 $2")
        .trim();

      caixaTexto.innerText = texto;
      atualizarStatus("Texto normalizado.");
    }

    function carregarArquivoTexto(event) {
      const arquivo = event.target.files[0];

      if (!arquivo) {
        return;
      }

      const nome = arquivo.name.toLowerCase();

      if (!nome.endsWith(".txt") && !nome.endsWith(".md")) {
        alert("Formato não recomendado. Use arquivos .txt ou .md nesta versão.");
        event.target.value = "";
        return;
      }

      const leitor = new FileReader();

      leitor.onload = function(e) {
        pararTexto(false);

        caixaTexto.innerText = e.target.result;
        textoOriginalLeitura = "";
        frasesLeitura = [];
        indiceFraseAtual = -1;

        atualizarStatus(`Arquivo carregado: ${arquivo.name}`);
      };

      leitor.onerror = function() {
        atualizarStatus("Erro ao carregar o arquivo.");
      };

      leitor.readAsText(arquivo, "UTF-8");
    }

    speechSynthesis.onvoiceschanged = carregarVozes;

    registrarLog("FoxReader V3.3 iniciado.");

    carregarVozes();

    setTimeout(carregarVozes, 1000);
  </script>

</body>
</html>
