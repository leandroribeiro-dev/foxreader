<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FoxReader V2.2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      max-width: 980px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .info {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    .aviso {
      background: #fff8d6;
      border: 1px solid #e5c94a;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    select,
    input[type="range"] {
      width: 100%;
      padding: 8px;
      font-size: 15px;
    }

    .linha {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 12px;
      align-items: center;
    }

    .checkbox-linha {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      background: #1f6feb;
      color: white;
    }

    button:hover {
      background: #1557b0;
    }

    button.stop {
      background: #b42318;
    }

    button.stop:hover {
      background: #8a1c13;
    }

    button.clear {
      background: #555;
    }

    button.clear:hover {
      background: #333;
    }

    .box {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      min-height: 350px;
      font-size: 18px;
      outline: none;
      white-space: pre-wrap;
    }

    /* Placeholder para div contenteditable */
    .box:empty::before {
      content: attr(data-placeholder);
      color: #888;
      pointer-events: none;
    }

    .status {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <h1>FoxReader V2.2</h1>

  <p class="info">
    Cole seu texto abaixo, escolha uma voz e use os botões de leitura.
  </p>

  <div class="aviso">
    Vozes <strong>Online/Natural</strong> podem ser mais agradáveis, mas podem falhar no HTML.
    As vozes locais, como <strong>Microsoft Maria</strong> e <strong>Microsoft Daniel</strong>, tendem a ser mais estáveis.
  </div>

  <div class="controls">
    <label>
      Voz:
      <select id="seletorVoz">
        <option>Carregando vozes...</option>
      </select>
    </label>

    <label class="checkbox-linha">
      <input type="checkbox" id="mostrarOnline" onchange="carregarVozes()">
      Mostrar também vozes Online/Natural
    </label>

    <div class="linha">
      <label>
        Velocidade:
        <input id="velocidade" type="range" min="0.6" max="1.6" step="0.1" value="1">
      </label>

      <strong id="valorVelocidade">1.0x</strong>
    </div>
  </div>

  <div class="toolbar">
    <button onclick="testarVoz()">Testar voz</button>
    <button onclick="lerTexto()">Ler texto</button>
    <button onclick="pausarTexto()">Pausar</button>
    <button onclick="continuarTexto()">Continuar</button>
    <button class="stop" onclick="pararTexto()">Parar</button>
    <button class="clear" onclick="limparTexto()">Limpar texto</button>
    <button onclick="carregarVozes()">Recarregar vozes</button>
  </div>

  <div id="status" class="status">
    Aguardando carregamento das vozes.
  </div>

  <div
    id="caixaTexto"
    class="box"
    contenteditable="true"
    data-placeholder="Cole seu texto aqui..."
  ></div>

  <script>
    let vozesDisponiveis = [];

    const seletor = document.getElementById("seletorVoz");
    const statusBox = document.getElementById("status");
    const velocidade = document.getElementById("velocidade");
    const valorVelocidade = document.getElementById("valorVelocidade");
    const mostrarOnline = document.getElementById("mostrarOnline");
    const caixaTexto = document.getElementById("caixaTexto");

    velocidade.addEventListener("input", function () {
      valorVelocidade.textContent = Number(velocidade.value).toFixed(1) + "x";
    });

    function ehVozOnlineOuNatural(voz) {
      const nome = voz.name.toLowerCase();

      return (
        nome.includes("online") ||
        nome.includes("natural")
      );
    }

    function carregarVozes() {
      vozesDisponiveis = speechSynthesis.getVoices();

      seletor.innerHTML = "";

      let vozesPortugues = vozesDisponiveis.filter(voz =>
        voz.lang.toLowerCase().startsWith("pt")
      );

      let listaFinal = vozesPortugues;

      if (!mostrarOnline.checked) {
        listaFinal = vozesPortugues.filter(voz => !ehVozOnlineOuNatural(voz));
      }

      if (listaFinal.length === 0 && vozesPortugues.length > 0) {
        listaFinal = vozesPortugues;
        statusBox.textContent = "Nenhuma voz local em português encontrada. Exibindo vozes em português disponíveis.";
      } else if (listaFinal.length > 0) {
        if (mostrarOnline.checked) {
          statusBox.textContent = `Foram encontradas ${listaFinal.length} voz(es) em português, incluindo Online/Natural.`;
        } else {
          statusBox.textContent = `Foram encontradas ${listaFinal.length} voz(es) locais em português.`;
        }
      } else {
        listaFinal = vozesDisponiveis;
        statusBox.textContent = "Nenhuma voz em português encontrada. Exibindo todas as vozes disponíveis.";
      }

      if (listaFinal.length === 0) {
        const option = document.createElement("option");
        option.textContent = "Nenhuma voz encontrada";
        option.value = "";
        seletor.appendChild(option);
        return;
      }

      listaFinal.forEach((voz) => {
        const option = document.createElement("option");
        option.value = voz.voiceURI;

        let marcador = "";

        if (ehVozOnlineOuNatural(voz)) {
          marcador = " [Online/Natural]";
        } else {
          marcador = " [Local]";
        }

        option.textContent = `${voz.name} (${voz.lang})${marcador}`;
        seletor.appendChild(option);
      });
    }

    function obterVozSelecionada() {
      const voiceURI = seletor.value;

      return vozesDisponiveis.find(voz => voz.voiceURI === voiceURI) || null;
    }

    function falar(texto) {
      if (!texto.trim()) {
        alert("Não há texto para leitura.");
        return;
      }

      speechSynthesis.cancel();

      const fala = new SpeechSynthesisUtterance(texto);
      const vozSelecionada = obterVozSelecionada();

      fala.rate = Number(velocidade.value);
      fala.pitch = 1;
      fala.volume = 1;
      fala.lang = "pt-BR";

      if (vozSelecionada) {
        fala.voice = vozSelecionada;
        fala.lang = vozSelecionada.lang;

        if (ehVozOnlineOuNatural(vozSelecionada)) {
          statusBox.textContent = `Tentando ler com voz Online/Natural: ${vozSelecionada.name}`;
        } else {
          statusBox.textContent = `Tentando ler com voz local: ${vozSelecionada.name}`;
        }
      } else {
        statusBox.textContent = "Lendo com a voz padrão do navegador.";
      }

      fala.onstart = function () {
        if (vozSelecionada) {
          statusBox.textContent = `Lendo com: ${vozSelecionada.name} (${vozSelecionada.lang})`;
        }
      };

      fala.onerror = function (event) {
        statusBox.textContent = "Erro na leitura. Tente uma voz local/offline.";
        console.error("Erro SpeechSynthesis:", event);
      };

      fala.onend = function () {
        statusBox.textContent = "Leitura concluída.";
      };

      speechSynthesis.speak(fala);
    }

    function testarVoz() {
      falar("Teste de leitura do FoxReader. Esta é uma voz em português.");
    }

    function lerTexto() {
      const texto = caixaTexto.innerText.trim();
      falar(texto);
    }

    function pausarTexto() {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        statusBox.textContent = "Leitura pausada.";
      }
    }

    function continuarTexto() {
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        statusBox.textContent = "Leitura retomada.";
      }
    }

    function pararTexto() {
      speechSynthesis.cancel();
      statusBox.textContent = "Leitura parada.";
    }

    function limparTexto() {
      pararTexto();
      caixaTexto.innerText = "";
      caixaTexto.focus();
      statusBox.textContent = "Texto limpo.";
    }

    speechSynthesis.onvoiceschanged = carregarVozes;

    carregarVozes();

    setTimeout(carregarVozes, 1000);
  </script>
</body>
</html>
